        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', 'Courier New', monospace; }
        
        /* === DEEP BLUE / AZURE (13,68,158 based) === */
        :root {
            --accent-primary: #0d44a0;
            --accent-glow: #1e5bc9;
            --accent-cyan: #3b82f6;
            --secondary-alert: #f97316;
            --bg-deep: #030712;
            --bg-panel: rgba(10, 20, 35, 0.92);
            --border-glow: 1px solid rgba(59, 130, 246, 0.5);
            --text-dim: #b0c4de;
            --card-bg-solid: #0a1220;
        }

        body { 
            background-color: var(--bg-deep); 
            color: #e2e8f0; 
            overflow-x: auto; 
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* --- LAYOUT UTILS --- */
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-10 { gap: 10px; } .gap-20 { gap: 20px; }
        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }

        /* --- HEADER (blue infused) --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(3, 7, 18, 0.92);
            border-bottom: 1px solid var(--accent-cyan);
            padding: 14px 0;
            backdrop-filter: blur(12px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
        }
        .brand { 
            font-size: 1.55rem; font-weight: bold; 
            color: var(--accent-cyan); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-shadow: 0 0 5px rgba(59,130,246,0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
            background: #0a1220;
        }
        .brand span { color: #ffffff; }
        
        .nav-link {
            background: transparent; border: none; color: #94a3b8; 
            font-size: 0.9rem; cursor: pointer; text-transform: uppercase; 
            margin-left: 24px; transition: 0.2s;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active { color: var(--accent-cyan); text-shadow: 0 0 6px #3b82f6; }

        /* --- HERO --- */
        .hero { 
            margin-top: 110px; 
            padding: 48px 20px 32px; 
            position: relative;
        }
        
        /* Hero section with left-aligned image and title */
        .hero-content {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        
        .hero-img-large {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            object-fit: cover;
            border: 3px solid #3b82f6;
            box-shadow: 0 0 30px rgba(59,130,246,0.6);
            background: #0a1220;
            transition: transform 0.3s ease;
        }
        
        .hero-img-large:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(59,130,246,0.8);
        }
        
        .hero-text {
            text-align: left;
        }
        
        .hero-text h1 { 
            font-size: 3.5rem; 
            color: white; 
            background: linear-gradient(135deg, #ffffff, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
        }
        
        .hero-text .subtitle-main { 
            color: #60a5fa; 
            font-size: 1.1rem; 
            letter-spacing: 1px;
            margin: 0;
        }
        
        .hero .subtitle-below {

            margin-top: 15px;
            margin-bottom: 32px; 
            letter-spacing: 1px;
            text-align: center;
        }
        
        /* --- FILTERS (blue aesthetic) --- */
        .filters { margin-bottom: 48px; flex-wrap: wrap; row-gap: 15px; }
        .filter-btn {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #93c5fd;
            padding: 8px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
        .filter-btn:hover, .filter-btn.active { 
            background: #1e40af; 
            color: #ffffff; 
            border-color: #60a5fa;
            box-shadow: 0 0 12px rgba(59,130,246,0.5);
        }
        
        .search-wrap { position: relative; margin-left: auto; }
        .search-input {
            background: rgba(0,0,0,0.65); border: 1px solid #2563eb; color: #e2e8f0;
            padding: 8px 18px; width: 260px; outline: none; border-radius: 40px;
            font-size: 0.85rem;
        }
        .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59,130,246,0.4); background: #0a0f1c; }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 32px; padding-bottom: 70px; }

        /* --- CARDS : blue border & dark panel --- */

            background: transparent;
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 20px;
            position: relative;
            transition: transform 0.25s ease, box-shadow 0.3s;
            backdrop-filter: blur(2px);
            overflow: hidden;
        }
        .card-inner { 
            background: linear-gradient(145deg, #0a1220 0%, #030712 100%);
            padding: 22px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            border-radius: 19px;
        }
        
        .card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px #3b82f6; 
            border-color: #3b82f6;
        }

        .card-header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 16px; 
            font-size: 0.7rem; 
            color: #7e8ba3; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .status-dot { width: 8px; height: 8px; background: #1f3a5f; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.online { background: #3b82f6; box-shadow: 0 0 6px #3b82f6; }

        .preview-box {
            height: 130px; background: #050b14; border: 1px solid #1e2a4a;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 18px; color: #4b6b9f; font-size: 0.75rem;
            border-radius: 14px;
            overflow: hidden;
        }
        
        .card h2 { color: #f0f6ff; font-size: 1.45rem; margin-bottom: 6px; letter-spacing: 0.5px; font-weight: 600; }
        .card p { color: #9ca8c3; font-size: 0.85rem; line-height: 1.5; margin-bottom: 22px; flex-grow: 1; }

        .card-footer { border-top: 1px solid #1e2a4a; padding-top: 16px; display: flex; align-items: center; justify-content: space-between; }
        .price { font-size: 1.3rem; font-weight: bold; color: #3b82f6; letter-spacing: -0.5px; }
        .price.free-price { color: #4ade80; text-shadow: 0 0 2px #4ade80; }
        
        .btn-buy {
            background: #2563eb; color: #ffffff; border: none;
            padding: 8px 22px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 0.75rem;
            border-radius: 40px;
            transition: 0.2s; text-decoration: none; display: inline-block;
            letter-spacing: 1px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .btn-buy:hover { background: #3b82f6; transform: scale(0.98); box-shadow: 0 0 12px #2563eb; }

        .btn-details {
            background: transparent; color: #7e8ba3; border: none; 
            cursor: pointer; font-size: 0.75rem; margin-right: 12px;
            transition: 0.2s; text-decoration: underline;
        }
        .btn-details:hover { color: #60a5fa; }

        /* --- MODAL (blue theme) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92); z-index: 999;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal {
            background: #0b1120; border: 1px solid #3b82f6;
            width: 640px; max-width: 95%; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px #2563eb;
            border-radius: 24px;
            position: relative;
        }
        .modal-header {
            background: rgba(37, 99, 235, 0.2);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e3a8a;
            border-radius: 24px 24px 0 0;
        }
        .modal-header h3 { color: #3b82f6; margin: 0; font-size: 1.4rem; letter-spacing: 1px; }
        .close-icon { color: #b9c8ff; cursor: pointer; font-size: 1.8rem; line-height: 1; transition: 0.2s; }
        .close-icon:hover { color: white; }
        
        .modal-body { padding: 28px 30px; }
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin: 24px 0; background: #07111f; padding: 18px; border-radius: 18px; border-left: 3px solid #3b82f6; }
        .spec-item { font-size: 0.9rem; }
        .spec-label { color: #6c86b0; display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .spec-val { color: #eef4ff; font-weight: 500; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin: 20px 0;
        }
        .custom-link-btn {
            background: #1e40af;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            width: 80%;
            text-align: center;
            transition: 0.2s;
            border: 1px solid #3b82f6;
        }
        .custom-link-btn:hover {
            background: #3b82f6;
            transform: scale(1.02);
            box-shadow: 0 0 12px #3b82f6;
        }

        /* responsive */
        @media (max-width: 700px) {
            .filters { flex-direction: column; align-items: stretch; }
            .search-wrap { margin-left: 0; margin-top: 12px; width: 100%; }
            .search-input { width: 100%; }
            .hero-content { flex-direction: column; align-items: center; text-align: center; gap: 20px; }
            .hero-text { text-align: center; }
            .hero-text h1 { font-size: 2rem; }
            .hero-img-large { width: 100px; height: 100px; }
            .brand { font-size: 1.2rem; }
            .brand-img { width: 32px; height: 32px; }
        }
    </style>
</head>

        const app = {
            currentFilter: 'all',
            
            init: function() {
                document.documentElement.style.setProperty('--accent-primary', CONFIG.branding.accentColor);
                document.getElementById('hero-head').innerText = CONFIG.branding.heroTitle;
                document.getElementById('hero-sub').innerText = CONFIG.branding.heroSubtitle;
                this.render(CONFIG.products);
                this.setActiveFilterUI('all');
            },

            render: function(list) {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = '';

                list.forEach(p => {
                    const imgExists = p.image && p.image.length > 10;
                    const imgContent = imgExists 
                        ? `<img src="${p.image}" style="width:100%; height:100%; object-fit:cover; opacity:0.95;" alt="${p.name} preview" onerror="this.parentElement.innerHTML='<div style=\'font-family:monospace; font-weight:bold; color:#3b82f6;\'>[ ${p.category.toUpperCase()} MODULE ]</div>'">`
                        : `<div style="font-family:monospace; font-weight:bold; color:#3b82f6;">[ ${p.category.toUpperCase()} MODULE ]</div>`;

                    const priceClass = (p.price === 'FREE' || p.price === 'Free') ? 'free-price' : '';
                    
                    const html = `
                        <div class="card">
                            <div class="card-inner">
                                <div class="card-header">
                                    <span>ID: ${p.id}</span>
                                    <span><span class="status-dot online"></span>ACTIVE</span>
                                </div>
                                
                                <div class="preview-box" style="${imgExists ? 'padding:0; border:1px solid #2563eb;' : ''}">
                                    ${imgContent}
                                </div>
                                
                                <h2>${this.escapeHtml(p.name)}</h2>
                                <p>${this.escapeHtml(p.shortDesc)}</p>
                                
                                <div class="card-footer">
                                    <span class="price ${priceClass}" style="color:${p.price === 'FREE' ? '#4ade80' : '#3b82f6'}">${p.price}</span>
                                    <div>
                                        <button class="btn-details" onclick="app.showProduct('${p.id}')">SPECS</button>
                                        <a href="${p.link}" target="_blank" class="btn-buy" style="margin-left:8px;">${p.price === 'FREE' ? 'GET' : 'BUY'}</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += html;
                });
                
                if(list.length === 0) {
                    grid.innerHTML = `<div class="text-center" style="grid-column:1/-1; padding:60px; color:#5a7caf;">⛔ NO MATCHING TOOLS FOUND ⛔</div>`;
                }
            },

            escapeHtml: function(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); },
            
            setFilter: function(cat) {
                this.currentFilter = cat;
                this.setActiveFilterUI(cat);
                let filtered = [];
                if(cat === 'all') {
                    filtered = [...CONFIG.products];
                } else {
                    filtered = CONFIG.products.filter(p => p.category === cat);
                }
                this.render(filtered);
            },
            
            setActiveFilterUI: function(cat) {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('active');
                    const btnText = btn.innerText.toLowerCase();
                    if(cat === 'all' && btnText.includes('all')) btn.classList.add('active');
                    else if(cat === 'rat' && btnText.includes('rat')) btn.classList.add('active');
                    else if(cat === 'exploit' && btnText.includes('exploit')) btn.classList.add('active');
                    else if(cat === 'free' && btnText.includes('freeware')) btn.classList.add('active');
                });
            },

            search: function(query) {
                const q = query.toLowerCase().trim();
                if(q === "") {
                    this.setFilter(this.currentFilter);
                    return;
                }
                const filtered = CONFIG.products.filter(p => 
                    p.name.toLowerCase().includes(q) || 
                    p.shortDesc.toLowerCase().includes(q) ||
                    p.fullDesc.toLowerCase().includes(q)
                );
                this.render(filtered);
            },

            showProduct: function(id) {
                const p = CONFIG.products.find(x => x.id === id);
                if(!p) return;

                const modalImg = p.image ? `<img src="${p.image}" style="width:100%; border-radius: 16px; border:1px solid #3b82f6; margin-bottom:20px; max-height:200px; object-fit:cover;" alt="${p.name}" onerror="this.style.display='none'">` : '';
                let detectionColor = '#4ade80';
                if(p.detected && (p.detected.includes('FUD') || p.detected.includes('0') || p.detected.toLowerCase().includes('clean'))) detectionColor = '#4ade80';
                else if(p.detected) detectionColor = '#f97316';
                
                const content = `
                    <div style="display:flex; flex-direction:column;">
                        ${modalImg}
                        <p style="color:#cbd5e6; line-height:1.6; font-size:0.95rem;">${p.fullDesc}</p>
                        
                        <div class="spec-grid">
                            <div class="spec-item">
                                <span class="spec-label">VERSION</span>
                                <span class="spec-val">${p.version}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">DETECTION RATE</span>
                                <span class="spec-val" style="color:${detectionColor}">${p.detected}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">LICENSE</span>
                                <span class="spec-val">Lifetime / HWID</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">SUPPORT TIER</span>
                                <span class="spec-val">24/7 Priority</span>
                            </div>
                        </div>

                        <a href="${p.link}" target="_blank" class="btn-buy" style="width:100%; text-align:center; padding:14px; font-size:0.9rem; background:#1e40af; border-radius:40px; text-decoration:none;">⟡ ACCESS / ${p.price} ⟡</a>
                        <p style="font-size:0.7rem; color:#4c6e9e; margin-top:18px; text-align:center;">Encrypted transaction • mirror access guaranteed</p>
                    </div>
                `;
                
                document.getElementById('m-title').innerText = `${p.name} // SPEC SHEET`;
                document.getElementById('m-body').innerHTML = content;
                document.getElementById('modal-overlay').style.display = 'flex';
            },

            openModal: function(type) {
                const titleEl = document.getElementById('m-title');
                const bodyEl = document.getElementById('m-body');
                if(type === 'about') {
                    titleEl.innerText = "⟡ SYSTEM MANIFESTO ⟡";
                    bodyEl.innerHTML = CONFIG.aboutHtml;
                } else if(type === 'contact') {
                    titleEl.innerText = "⟡ LINK ALL ⟡";
                    bodyEl.innerHTML = CONFIG.contactHtml;
                }
                document.getElementById('modal-overlay').style.display = 'flex';
            },

            closeModal: function() {
                document.getElementById('modal-overlay').style.display = 'none';
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
